[workspace]
authors = ["Duane Goodner <dmgoodner@gmail.com>"]
channels = ["conda-forge"]
name = "agentrelay"
platforms = ["linux-64"]
version = "0.1.0"

[dependencies]
python = ">=3.12,<3.13"
pyyaml = ">=6.0.3,<7"
pytest = ">=9.0.2,<10"
black = "*"
isort = "*"
pyright = "*"
mkdocs = "*"
mkdocs-material = "*"
mkdocstrings = "*"
mkdocstrings-python = "*"
d2 = "*"

[pypi-dependencies]
agentrelay = { path = ".", editable = true }

[tasks]
pytest = "python -m pytest"
test = "python -m pytest"
typecheck = "pyright src/agentrelay/"
format = "black . --extend-exclude '\\.pixi/' && isort . --skip .pixi --skip-glob '.pixi/*'"
check = "black . --extend-exclude '\\.pixi/' && isort . --skip .pixi --skip-glob '.pixi/*' && pyright src/agentrelay/ && python -m pytest"
diagram = "bash tools/render_diagrams.sh"
setup-hooks = "git config core.hooksPath .githooks"
e2e = "bash tools/e2e_run.sh"
e2e-reset = "bash tools/e2e_reset.sh"
e2e-check = "bash tools/e2e_check.sh"
docker-build = "bash tools/docker_build.sh"
docs = "mkdocs serve"
docs-build = "mkdocs build"
docs-deploy = "mkdocs gh-deploy --force"
