name: mixed-default-and-explicit-workstreams

workstreams:
  - id: default
    base_branch: main
    merge_target_branch: main

  - id: feature_b
    base_branch: main
    merge_target_branch: main

tasks:
  - id: prep_repo
    description: Uses the explicit default workstream.

  - id: implement_feature_b
    dependencies: [prep_repo]
    workstream_id: feature_b
