name: concern-implementer
tmux_session: agentrelay
model: claude-sonnet-4-6
tools:
  - pixi

# Single-task graph for testing implementer concern discovery.
# Setup: ./fixtures/setup_fixtures.sh all <target-repo>
# (commits bounded_queue.py stubs + test_bounded_queue.py tests)
#
# The implementer should notice that the push() docstring says it evicts the
# oldest item, but the tests expect OverflowError, and record it as a design
# concern.

tasks:
  - id: impl_bounded_queue
    role: implementer
    paths:
      src:
        - src/agentrelaydemos/bounded_queue.py
      test:
        - tests/test_bounded_queue.py
    dependencies: []
