name: concern-spec-writer
model: claude-sonnet-4-6
tools:
  - pixi

# Single-task graph for testing spec_writer concern discovery.
# No fixture setup needed — the contradiction is in the task description.
# Run on a clean target repo (no pre-existing bounded_queue.py).
#
# The description says push() evicts the oldest item when full (Core
# operations) but also says push() raises OverflowError when full (Error
# handling). The spec_writer should notice and record this as a design concern.

tasks:
  - id: spec_bounded_queue
    role: spec_writer
    description: >-
      Create a BoundedQueue[T] class — a generic, fixed-capacity FIFO queue.


      Constructor:

      - __init__(capacity: int) — capacity must be a positive integer
        (raise ValueError if capacity <= 0).


      Core operations:

      - push(item: T) -> None — Add item to the back of the queue. If the
        queue is at capacity, the oldest item is automatically evicted to
        make room for the new item.

      - pop() -> T — Remove and return the front item. Raise IndexError
        if the queue is empty.

      - peek() -> T — Return the front item without removing it. Raise
        IndexError if the queue is empty.


      Query methods:

      - is_full() -> bool — True when the current length equals capacity.

      - __len__() -> int — Current number of items in the queue.

      - capacity (read-only property) -> int — The maximum number of items.


      Error handling:

      All mutating methods must validate preconditions and raise appropriate
      exceptions. push() raises OverflowError when the queue has reached
      capacity. pop() and peek() raise IndexError when the queue is empty.
    paths:
      src:
        - src/agentrelaydemos/bounded_queue.py
    dependencies: []
