name: agentrelaydemos
target_repo: /data/git/agentrelaydemos

tasks:
  - id: write_greet_fn
    description: >-
      Create src/agentrelaydemos/greet.py containing a function
      greet(name: str) -> str that returns the string "Hello, {name}!".
      Also create tests/test_greet.py with at least two pytest tests for it.
    dependencies: []

  - id: write_farewell_fn
    description: >-
      Create src/agentrelaydemos/farewell.py containing a function
      farewell(name: str) -> str that returns the string "Goodbye, {name}!".
      Also create tests/test_farewell.py with at least two pytest tests for it.
    dependencies: []

  - id: write_greeter_script
    description: >-
      Create src/agentrelaydemos/greeter.py — a script that imports greet from
      agentrelaydemos.greet and farewell from agentrelaydemos.farewell, then
      prints greet() and farewell() for the names "Alice", "Bob", and "Carol".
    dependencies:
      - write_greet_fn
      - write_farewell_fn
