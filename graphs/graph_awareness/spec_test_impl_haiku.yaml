name: graph-awareness-spec-test-impl-haiku
model: claude-haiku-4-5-20251001
tools:
  - pixi

tasks:
  - id: spec_bounded_queue
    description: >
      Write a Python module at src/agentrelaydemos/bounded_queue.py containing
      a BoundedQueue class. Write only stubs (raise NotImplementedError) with
      full type annotations and docstrings. The class should support:
      - __init__(self, capacity: int) — create a queue with a fixed max size
      - enqueue(self, item: object) -> None — add an item; raise OverflowError if full
      - dequeue(self) -> object — remove and return the oldest item; raise IndexError if empty
      - peek(self) -> object — return the oldest item without removing; raise IndexError if empty
      - __len__(self) -> int — return current number of items
      - is_empty(self) -> bool
      - is_full(self) -> bool

      Read the graph YAML to see what downstream tasks will do with your
      output, and write your summary accordingly.
    dependencies: []

  - id: test_bounded_queue
    description: >
      Read the graph YAML to find the upstream task that wrote the spec.
      Read that task's summary to understand what was produced and where
      the file is. Then read the spec file itself and write comprehensive
      tests for the full API defined in its stubs and docstrings.

      Place your test file at tests/test_bounded_queue.py. Use plain pytest
      (no fixtures beyond tmp_path if needed). Cover normal behavior, edge
      cases, and all documented error conditions.

      Write your summary so the downstream implementer knows where the
      tests are and what they cover.
    dependencies: [spec_bounded_queue]

  - id: impl_bounded_queue
    description: >
      Read the graph YAML to find the upstream tasks. Read their summaries
      to understand what spec file was produced and where the tests are.
      Then implement the stubs in the spec file so that all tests pass.

      Do not modify the test file. Run the tests to verify your
      implementation before completing.
    dependencies: [spec_bounded_queue, test_bounded_queue]
    completion_gate: "pixi run pytest tests/test_bounded_queue.py -q"
    max_gate_attempts: 3
