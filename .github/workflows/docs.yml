name: Deploy docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: docs-site
      url: https://duanegoodner.github.io/agentrelay/
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: prefix-dev/setup-pixi@v0.8.4
        with:
          pixi-version: latest
      # Diagram SVGs are pre-rendered locally (requires TALA layout engine)
      # and committed to the repo. A pre-commit hook (.githooks/pre-commit)
      # ensures D2 source and SVG stay in sync.
      - run: pixi run docs-deploy
