name: Deploy docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: docs-site
      url: https://duanegoodner.github.io/agentrelay/
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: prefix-dev/setup-pixi@v0.8.4
        with:
          pixi-version: latest
      - name: Render diagram SVG
        run: pixi run diagram
      - run: pixi run docs-deploy
