name: Deploy docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: prefix-dev/setup-pixi@v0.8.4
        with:
          pixi-version: latest
      - name: Verify diagram SVG is up to date
        run: |
          pixi run diagram
          git diff --exit-code docs/diagram.svg || (echo "ERROR: docs/diagram.svg is stale. Run 'pixi run diagram' and commit the result." && exit 1)
      - run: pixi run docs-deploy
