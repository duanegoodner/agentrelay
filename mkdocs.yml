site_name: agentrelay
site_description: Multi-agent orchestration system
docs_dir: docs

theme:
  name: material

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            members_order: source

nav:
  - Home: index.md
  - Architecture: ARCHITECTURE.md
  - Workflow: WORKFLOW.md
  - Guide: GUIDE.md
  - Changelog: HISTORY.md
  - Backlog: BACKLOG.md
  - API Reference:
    - Task: api/task.md
    - Environments: api/environments.md
    - Task Runtime: api/task_runtime.md
    - Agent: api/agent.md
