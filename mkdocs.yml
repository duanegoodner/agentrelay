site_name: agentrelay
site_description: Multi-agent orchestration system
site_url: https://duanegoodner.github.io/agentrelay/
docs_dir: docs

theme:
  name: material
  palette:
    primary: black
    accent: teal
  icon:
    logo: material/robot-outline

extra_css:
  - stylesheets/extra.css

hooks:
  - hooks.py

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: false
            show_root_full_path: true
            members_order: source

nav:
  - Home: index.md
  - Architecture: ARCHITECTURE.md
  - Design Diagram: DIAGRAM.md
  - Workflow: WORKFLOW.md
  - Guide: GUIDE.md
  - Testing: TESTING.md
  - Changelog: HISTORY.md
  - Backlog: BACKLOG.md
  - Prototype v01:
    - Overview: prototypes/v01/index.md
    - Workflow Description: prototypes/v01/WORKFLOW_DESCRIPTION.md
    - Operations: prototypes/v01/OPERATIONS.md
    - Design Decisions: prototypes/v01/DESIGN_DECISIONS.md
    - History: prototypes/v01/HISTORY.md
    - Backlog: prototypes/v01/BACKLOG.md
  - API Reference:
    - Overview: api/index.md
    - task: api/core/task.md
    - environments: api/core/environments.md
    - task_runner: api/core/task_runner.md
    - orchestrator: api/core/orchestrator.md
    - agent: api/agent/index.md
    - task_graph: api/task_graph/index.md
    - task_graph.indexing: api/task_graph/indexing.md
    - task_graph.validation: api/task_graph/validation.md
    - task_runtime: api/task_runtime/index.md
    - workstream: api/workstream/index.md
