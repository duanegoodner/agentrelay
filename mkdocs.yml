site_name: agentrelay
site_description: Multi-agent orchestration system
site_url: https://duanegoodner.github.io/agentrelay/
docs_dir: docs

theme:
  name: material
  palette:
    primary: black
    accent: teal
  icon:
    logo: material/robot-outline

extra_css:
  - stylesheets/extra.css

hooks:
  - hooks.py

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: false
            show_root_full_path: true
            members_order: source

nav:
  - Home: index.md
  - Architecture: ARCHITECTURE.md
  - Design Diagram: DIAGRAM.md
  - Workflow: WORKFLOW.md
  - Guide: GUIDE.md
  - Changelog: HISTORY.md
  - Backlog: BACKLOG.md
  - API Reference:
    - task: api/task.md
    - environments: api/environments.md
    - task_runtime: api/task_runtime.md
    - agent: api/agent.md
